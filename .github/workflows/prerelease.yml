name: Prerelease

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # net5.0 supports these RIDs. osx-arm64 is .NET 6+ only; Apple Silicon
        # users run the osx-x64 build under Rosetta 2 (transparent, fast enough
        # for a CLI tool that doesn't need native ARM perf).
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 5.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --nologo

      - name: Compute version
        id: version
        shell: bash
        run: |
          PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "full=v${PREFIX}-alpha.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/BspLightReSlopper/BspLightReSlopper.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -p:Version=${{ steps.version.outputs.prefix }}-alpha.${{ github.run_number }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p artifacts
          RID="${{ matrix.rid }}"
          TAG="${{ steps.version.outputs.full }}"
          SRC="src/BspLightReSlopper/bin/Release/net5.0/${RID}/publish"
          case "$RID" in
            win-*)
              cp "${SRC}/bsplrs.exe" "artifacts/bsplrs-${TAG}-${RID}.exe"
              ;;
            *)
              cp "${SRC}/bsplrs" "artifacts/bsplrs-${TAG}-${RID}"
              chmod +x "artifacts/bsplrs-${TAG}-${RID}"
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}-binary
          path: artifacts/*

  create-release:
    needs: build-test-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          echo "full=v${PREFIX}-alpha.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.full }}"
          echo "Creating prerelease ${TAG}"
          gh release create "${TAG}" \
            --prerelease \
            --title "Pre-release ${TAG}" \
            --notes $'Automated pre-release build.\n\nCommit: ${{ github.sha }}\n\n**Requires the .NET 5 runtime on the host system** (https://dotnet.microsoft.com/download/dotnet/5.0). Binaries are framework-dependent single-file (a few MB). Apple Silicon: download the osx-x64 build; macOS will run it transparently under Rosetta 2.' \
            artifacts/*
